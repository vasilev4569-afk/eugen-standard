{{ define "main" }}
<article class="review-page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}
      <p class="lead">{{ . }}</p>
    {{ end }}
  </header>

  <section class="review-content">
    {{ .Content }}
  </section>

  {{ with .Lastmod }}
    <footer class="meta">
      <p class="small muted">{{ i18n "data_last_updated" }}: {{ .Format "2006-01-02" }}</p>
    </footer>
  {{ end }}
</article>
{{ end }}
