backend:
  name: github
  repo: vasilev4569-afk/eugen-standard
  branch: main
  base_url: https://eugen.vasilev4569.workers.dev
  auth_endpoint: auth

site_url: https://eugen-standard.pages.dev
display_url: https://eugen-standard.pages.dev

publish_mode: editorial_workflow

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "reviews_en"
    label: "Reviews (EN)"
    folder: "content/en/reviews"
    create: true
    nested:
      depth: 4
      subfolders: false
    meta:
      path:
        widget: string
        label: "Path"
        index_file: "_index"
    summary: "{{fields.title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Breadcrumb Title", name: "breadcrumbTitle", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "string", required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
        modes: ["raw", "rich_text"]
        buttons: ["bold", "italic", "heading-two", "heading-three", "quote", "link", "bulleted-list", "numbered-list"]
        editor_components: ["image", "code-block"]
